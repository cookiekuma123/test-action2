name: Artifact Name Unicode Directory Collision Lab

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    outputs:
      trusted_ff: ${{ steps.names.outputs.trusted_ff }}
      attacker_ff: ${{ steps.names.outputs.attacker_ff }}
      trusted_nfc: ${{ steps.names.outputs.trusted_nfc }}
      attacker_nfd: ${{ steps.names.outputs.attacker_nfd }}
      pattern: ${{ steps.names.outputs.pattern }}
    steps:
      - name: Resolve artifact names
        id: names
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os

          run_id = os.environ["GITHUB_RUN_ID"]
          prefix = f"artifact-name-collision-{run_id}"
          values = {
              "trusted_ff": f"{prefix}-lib-ff",
              "attacker_ff": f"{prefix}-lib-\ufb00",
              "trusted_nfc": f"{prefix}-release-\u00e9",
              "attacker_nfd": f"{prefix}-release-e\u0301",
              "pattern": f"{prefix}-*",
          }
          for key, value in values.items():
              print(f"{key}={value}")
          PY

      - name: Prepare payloads
        shell: bash
        run: |
          set -euo pipefail
          rm -rf payloads
          mkdir -p payloads/trusted-ff payloads/attacker-ff payloads/trusted-nfc payloads/attacker-nfd
          {
            echo "source=trusted-ascii-ff"
            echo "artifact-name=${{ steps.names.outputs.trusted_ff }}"
            echo "run-id=${GITHUB_RUN_ID}"
          } > payloads/trusted-ff/provenance.txt
          {
            echo "source=attacker-ligature-ff"
            echo "artifact-name=${{ steps.names.outputs.attacker_ff }}"
            echo "run-id=${GITHUB_RUN_ID}"
          } > payloads/attacker-ff/provenance.txt
          {
            echo "source=trusted-nfc"
            echo "artifact-name=${{ steps.names.outputs.trusted_nfc }}"
            echo "run-id=${GITHUB_RUN_ID}"
          } > payloads/trusted-nfc/provenance.txt
          {
            echo "source=attacker-nfd"
            echo "artifact-name=${{ steps.names.outputs.attacker_nfd }}"
            echo "run-id=${GITHUB_RUN_ID}"
          } > payloads/attacker-nfd/provenance.txt

      - name: Upload trusted ASCII ff artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.names.outputs.trusted_ff }}
          path: payloads/trusted-ff
          include-hidden-files: true

      - name: Upload attacker ligature ff artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.names.outputs.attacker_ff }}
          path: payloads/attacker-ff
          include-hidden-files: true

      - name: Upload trusted NFC artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.names.outputs.trusted_nfc }}
          path: payloads/trusted-nfc
          include-hidden-files: true

      - name: Upload attacker NFD artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.names.outputs.attacker_nfd }}
          path: payloads/attacker-nfd
          include-hidden-files: true

  inspect:
    needs: upload
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download matching artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: ${{ needs.upload.outputs.pattern }}
          path: downloaded
          merge-multiple: false

      - name: Inspect artifact-name directories
        shell: bash
        env:
          TRUSTED_FF: ${{ needs.upload.outputs.trusted_ff }}
          ATTACKER_FF: ${{ needs.upload.outputs.attacker_ff }}
          TRUSTED_NFC: ${{ needs.upload.outputs.trusted_nfc }}
          ATTACKER_NFD: ${{ needs.upload.outputs.attacker_nfd }}
          PATTERN: ${{ needs.upload.outputs.pattern }}
        run: |
          set -euo pipefail
          export PYTHONIOENCODING=utf-8
          if command -v python3 >/dev/null 2>&1; then
            PY=python3
          else
            PY=python
          fi
          "$PY" - <<'PY'
          from pathlib import Path
          import json
          import os
          import platform
          import unicodedata

          root = Path("downloaded")
          pairs = [
              ("ff", os.environ["TRUSTED_FF"], os.environ["ATTACKER_FF"]),
              ("accent", os.environ["TRUSTED_NFC"], os.environ["ATTACKER_NFD"]),
          ]

          def describe(value):
              return {
                  "value": value,
                  "length": len(value),
                  "byteLength": len(value.encode("utf-8")),
                  "utf8Hex": value.encode("utf-8").hex(),
                  "codePoints": [f"U+{ord(ch):04X}" for ch in value],
                  "nfc": unicodedata.normalize("NFC", value),
                  "nfkc": unicodedata.normalize("NFKC", value),
                  "casefold": value.casefold(),
              }

          entries = sorted(p for p in root.iterdir()) if root.exists() else []
          print(f"os={platform.platform()}")
          print(f"pattern={os.environ['PATTERN']}")
          print(f"downloaded_entry_count={len(entries)}")
          print("downloaded_entries:")
          for entry in entries:
              rel = entry.name
              marker = entry / "provenance.txt"
              content = marker.read_text(encoding="utf-8", errors="replace").strip() if marker.exists() else "<missing>"
              print(repr(rel), "is_dir=" + str(entry.is_dir()), "content=" + repr(content))

          observations = {
              "platform": platform.platform(),
              "pattern": os.environ["PATTERN"],
              "entries": [
                  {
                      "name": entry.name,
                      "isDir": entry.is_dir(),
                      "content": (entry / "provenance.txt").read_text(encoding="utf-8", errors="replace").strip()
                      if (entry / "provenance.txt").exists()
                      else None,
                  }
                  for entry in entries
              ],
              "pairs": [],
          }

          print("expected_path_reads:")
          for label, trusted, attacker in pairs:
              trusted_path = root / trusted / "provenance.txt"
              attacker_path = root / attacker / "provenance.txt"
              trusted_exists = trusted_path.exists()
              attacker_exists = attacker_path.exists()
              trusted_content = trusted_path.read_text(encoding="utf-8", errors="replace").strip() if trusted_exists else "<missing>"
              attacker_content = attacker_path.read_text(encoding="utf-8", errors="replace").strip() if attacker_exists else "<missing>"
              samefile = None
              if trusted_exists and attacker_exists:
                  try:
                      samefile = os.path.samefile(trusted_path, attacker_path)
                  except OSError as exc:
                      samefile = f"error:{exc}"
              record = {
                  "label": label,
                  "trusted": describe(trusted),
                  "attacker": describe(attacker),
                  "rawEqual": trusted == attacker,
                  "nfcEqual": unicodedata.normalize("NFC", trusted) == unicodedata.normalize("NFC", attacker),
                  "nfkcEqual": unicodedata.normalize("NFKC", trusted) == unicodedata.normalize("NFKC", attacker),
                  "casefoldEqual": trusted.casefold() == attacker.casefold(),
                  "trustedPathExists": trusted_exists,
                  "attackerPathExists": attacker_exists,
                  "trustedReadContent": trusted_content,
                  "attackerReadContent": attacker_content,
                  "samefile": samefile,
              }
              observations["pairs"].append(record)
              print(json.dumps(record, ensure_ascii=False, sort_keys=True))

          Path("observations").mkdir(exist_ok=True)
          Path("observations/artifact-name-directory-collision.json").write_text(
              json.dumps(observations, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload observations
        uses: actions/upload-artifact@v7
        with:
          name: artifact-name-directory-collision-observations-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: observations
          include-hidden-files: true
