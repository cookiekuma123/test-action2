name: Artifact CodeExec Action Upload Source Impact

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trusted:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare trusted deploy artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p trusted-deploy
          cat > trusted-deploy/deploy.sh <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          mkdir -p observations
          {
            echo "source=trusted-deploy-script"
            echo "method=trusted-upload-artifact"
            echo "run-id=${GITHUB_RUN_ID}"
          } > observations/codeexec-proof.txt
          SH
          chmod +x trusted-deploy/deploy.sh

      - name: Upload trusted deploy artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact-codeexec-impact-${{ github.run_id }}-deploy-é
          path: trusted-deploy
          include-hidden-files: true

  attacker-action-upload:
    needs: trusted
    runs-on: ubuntu-latest
    steps:
      - name: Checkout action code
        uses: actions/checkout@v5

      - name: Upload confusable deploy artifact from action code
        uses: ./.github/actions/runtime-artifact-codeexec-upload
